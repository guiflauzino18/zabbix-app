<svg width="100%" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; }
      .th { font-size: 14px; font-weight: 500; fill: #3C3489; }
      .ts { font-size: 12px; font-weight: 400; fill: #534AB7; }
      .th-blue { font-size: 14px; font-weight: 500; fill: #0C447C; }
      .ts-blue { font-size: 12px; font-weight: 400; fill: #185FA5; }
      .th-teal { font-size: 14px; font-weight: 500; fill: #085041; }
      .ts-teal { font-size: 12px; font-weight: 400; fill: #0F6E56; }
      .th-amber { font-size: 14px; font-weight: 500; fill: #633806; }
      .ts-amber { font-size: 12px; font-weight: 400; fill: #854F0B; }
      .th-coral { font-size: 14px; font-weight: 500; fill: #712B13; }
      .ts-coral { font-size: 12px; font-weight: 400; fill: #993C1D; }
      .th-green { font-size: 14px; font-weight: 500; fill: #27500A; }
      .ts-green { font-size: 12px; font-weight: 400; fill: #3B6D11; }
      .th-gray { font-size: 14px; font-weight: 500; fill: #444441; }
      .ts-gray { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <!-- Phase 1 - Purple -->
  <rect x="40" y="20" width="600" height="112" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="60" y="46">Fase 1 — Fundação &amp; Autenticação</text>
  <text class="ts" x="60" y="62">Semanas 1–2 · Início imediato</text>
  <rect x="56" y="72" width="176" height="48" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text class="th-gray" x="144" y="92" text-anchor="middle">Setup do projeto</text>
  <text class="ts-gray" x="144" y="108" text-anchor="middle">Expo + TypeScript + NX</text>
  <rect x="248" y="72" width="176" height="48" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text class="th-gray" x="336" y="92" text-anchor="middle">Multi-servidor</text>
  <text class="ts-gray" x="336" y="108" text-anchor="middle">Config e troca dinâmica</text>
  <rect x="440" y="72" width="184" height="48" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text class="th-gray" x="532" y="92" text-anchor="middle">Autenticação Zabbix</text>
  <text class="ts-gray" x="532" y="108" text-anchor="middle">Login + token + logout</text>

  <line x1="340" y1="132" x2="340" y2="158" class="arr" marker-end="url(#arrow)"/>

  <!-- Phase 2 - Blue -->
  <rect x="40" y="158" width="600" height="112" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th-blue" x="60" y="184">Fase 2 — Dashboard de Incidentes</text>
  <text class="ts-blue" x="60" y="200">Semanas 3–4 · Entregável: tela principal funcional</text>
  <rect x="56" y="210" width="176" height="48" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text class="th-gray" x="144" y="230" text-anchor="middle">Listagem de triggers</text>
  <text class="ts-gray" x="144" y="246" text-anchor="middle">Filtro por severidade</text>
  <rect x="248" y="210" width="176" height="48" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text class="th-gray" x="336" y="230" text-anchor="middle">Detalhes do evento</text>
  <text class="ts-gray" x="336" y="246" text-anchor="middle">Ack + histórico</text>
  <rect x="440" y="210" width="184" height="48" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text class="th-gray" x="532" y="230" text-anchor="middle">Atualização em tempo real</text>
  <text class="ts-gray" x="532" y="246" text-anchor="middle">Polling / WebSocket</text>

  <line x1="340" y1="270" x2="340" y2="296" class="arr" marker-end="url(#arrow)"/>

