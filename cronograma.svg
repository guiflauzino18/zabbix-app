  <rect x="40" y="296" width="600" height="112" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th-teal" x="60" y="322">Fase 3 — Hosts &amp; Itens</text>
  <text class="ts-teal" x="60" y="338">Semanas 5–6 · Entregável: inventário navegável</text>
  <rect x="56" y="348" width="176" height="48" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text class="th-gray" x="144" y="368" text-anchor="middle">Lista de hosts</text>
  <text class="ts-gray" x="144" y="384" text-anchor="middle">Grupos e filtros</text>
  <rect x="248" y="348" width="176" height="48" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text class="th-gray" x="336" y="368" text-anchor="middle">Itens &amp; métricas</text>
  <text class="ts-gray" x="336" y="384" text-anchor="middle">Últimos valores</text>
  <rect x="440" y="348" width="184" height="48" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text class="th-gray" x="532" y="368" text-anchor="middle">Gráfico de série temporal</text>
  <text class="ts-gray" x="532" y="384" text-anchor="middle">Charts nativos</text>

  <line x1="340" y1="408" x2="340" y2="434" class="arr" marker-end="url(#arrow)"/>

  <!-- Phase 4 - Amber -->
  <rect x="40" y="434" width="600" height="112" rx="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th-amber" x="60" y="460">Fase 4 — Notificações &amp; Alertas</text>
  <text class="ts-amber" x="60" y="476">Semanas 7–8 · Entregável: push notifications</text>
  <rect x="56" y="486" width="176" height="48" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text class="th-gray" x="144" y="506" text-anchor="middle">Push notifications</text>
  <text class="ts-gray" x="144" y="522" text-anchor="middle">Expo Notifications</text>
  <rect x="248" y="486" width="176" height="48" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text class="th-gray" x="336" y="506" text-anchor="middle">Filtros de alerta</text>
  <text class="ts-gray" x="336" y="522" text-anchor="middle">Por severidade / host</text>
  <rect x="440" y="486" width="184" height="48" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text class="th-gray" x="532" y="506" text-anchor="middle">Sons e prioridades</text>
  <text class="ts-gray" x="532" y="522" text-anchor="middle">Configurável por servidor</text>

  <line x1="340" y1="546" x2="340" y2="572" class="arr" marker-end="url(#arrow)"/>

  <!-- Phase 5 - Coral -->
  <rect x="40" y="572" width="600" height="112" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th-coral" x="60" y="598">Fase 5 — Mapas &amp; Relatórios</text>
  <text class="ts-coral" x="60" y="614">Semanas 9–10 · Entregável: visão estratégica</text>
  <rect x="56" y="624" width="176" height="48" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text class="th-gray" x="144" y="644" text-anchor="middle">Mapas de rede</text>
  <text class="ts-gray" x="144" y="660" text-anchor="middle">Topologia visual</text>
  <rect x="248" y="624" width="176" height="48" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text class="th-gray" x="336" y="644" text-anchor="middle">Relatórios SLA</text>
  <text class="ts-gray" x="336" y="660" text-anchor="middle">Disponibilidade</text>
  <rect x="440" y="624" width="184" height="48" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text class="th-gray" x="532" y="644" text-anchor="middle">Exportação de dados</text>
  <text class="ts-gray" x="532" y="660" text-anchor="middle">PDF / CSV</text>

  <line x1="340" y1="684" x2="340" y2="710" class="arr" marker-end="url(#arrow)"/>

  <!-- Phase 6 - Green -->
  <rect x="40" y="710" width="600" height="90" rx="12" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text class="th-green" x="60" y="736">Fase 6 — Polimento &amp; Publicação</text>
  <text class="ts-green" x="60" y="752">Semanas 11–12 · Entregável: app nas stores</text>
  <text class="ts-green" x="60" y="770">Testes E2E · Performance · App Store / Play Store</text>
  <text class="ts-green" x="60" y="786">Dark mode · Acessibilidade · CI/CD</text>
</svg>
